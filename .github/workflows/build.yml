name: Build GTNH Mod

on:
  push:
    branches: [ "**" ]
    tags: [ "v*", "*test*" ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar
          if-no-files-found: error

  release-stable:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mod-jar
          path: build/libs

      - name: Create stable release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          files: |
            build/libs/*[!s].jar
          generate_release_notes: true

  release-test:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'test')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: test-prerelease-release
      cancel-in-progress: true

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mod-jar
          path: build/libs

      - name: Delete previous rolling test prerelease
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const rollingTag = 'test-latest';

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: rollingTag,
              });

              core.info(`Deleting existing release ${release.data.id} for ${rollingTag}`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.info(`No existing release found for ${rollingTag}`);
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${rollingTag}`,
              });
              core.info(`Deleted existing ref tags/${rollingTag}`);
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) {
                throw error;
              }
              core.info(`No existing ref to delete for tags/${rollingTag}`);
            }

      - name: Create rolling test prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test-latest
          name: Test Build
          prerelease: true
          target_commitish: ${{ github.sha }}
          body: |
            Rolling prerelease updated from source tag `${{ github.ref_name }}`.

            Commit: `${{ github.sha }}`
          files: |
            build/libs/*[!s].jar
